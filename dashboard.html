<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Dashboard | STB Bank</title>
</head>
<body>
    <header>
        <div class="logo"><h2>STB BANK</h2></div>
        <nav>
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('transfers') }}">Transfers</a>
            <a href="{{ url_for('accounts') }}">Accounts</a>
            <a href="{{ url_for('cards') }}">Cards</a>
            <a href="{{ url_for('investment') }}">Investment</a>
            <a href="{{ url_for('settings') }}">Settings</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
    </header>
    <main class="container">
        <div class="glass-card">
            <h3 style="color:#00ff9d">WELCOME BACK, {{ current_user.customer_id }}</h3>
            <h1 style="font-size: 3rem; margin: 10px 0;">₹ {{ "{:,.2f}".format(balance) }}</h1>
            <p style="color: #94a3b8">Account Status: <span style="color: #10b981">● SECURED</span></p>
            <div style="margin-top: 30px; display: flex; gap: 15px;">
                <a href="{{ url_for('transfers') }}" class="btn" style="text-decoration:none; background:#00ff9d; color:black; padding:10px 20px; border-radius:5px; font-weight:bold;">Send Money</a>
            </div>
        </div>
    </main>
</body>
</html>
