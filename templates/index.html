<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STB Bank | AI Secured</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050a14;
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            transition: background 0.5s;
        }


    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 8%;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #1e293b;
    }

    .logo h2 {
        color: #10b981;
        letter-spacing: 2px;
        font-weight: 800;
        margin: 0;
    }

    nav a {
        color: #94a3b8;
        text-decoration: none;
        margin-left: 30px;
        font-weight: 500;
        transition: 0.3s;
    }

    nav a:hover { color: #10b981; }

    .btn-signin {
        background: #10b981;
        color: #050a14;
        padding: 10px 25px;
        border-radius: 50px;
        font-weight: bold;
        box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
    }

    .hero {
        text-align: center;
        margin-top: 120px;
        padding: 0 20px;
    }

    .glow-text {
        font-size: 4rem;
        font-weight: 800;
        color: #ffffff;
        text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        margin-bottom: 10px;
    }

    .sub-text {
        color: #94a3b8;
        font-size: 1.2rem;
        max-width: 600px;
        margin: 0 auto 40px auto;
        line-height: 1.6;
    }

    .cta-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .btn-main {
        padding: 15px 35px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        font-size: 1rem;
        transition: 0.3s;
    }

    .btn-primary {
        background: #10b981;
        color: #050a14;
        box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    }

    .btn-secondary {
        background: #1e293b;
        color: white;
        border: 1px solid #334155;
    }

    .btn-main:hover { transform: translateY(-3px); opacity: 0.9; }

    #security-alert {
        display: none;
        background: #ef4444;
        color: white;
        text-align: center;
        padding: 12px;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 9999;
        font-weight: bold;
    }

    .lockdown { background-color: #1a0505 !important; }
</style>


</head>
<body id="main-body">

<div id="security-alert">⚠️ UNAUTHORIZED SYSTEM ACCESS DETECTED</div>

<header>
    <div class="logo"><h2>STB BANK</h2></div>
    <nav>
        <a href="#">Technology</a>
        <a href="#">Support</a>


    <!-- ✅ FIXED -->
    <a href="{{ url_for('login') }}" class="btn-signin">Sign In</a>
</nav>


</header>

<main class="hero">
    <h1 id="hero-text" class="glow-text">Secure Your Assets with AI</h1>

<p id="sub-text" class="sub-text">
    Experience next generation banking with ML + Honeypot security.
</p>

<div class="cta-buttons">

    <!-- ✅ FIXED -->
    <a href="{{ url_for('login') }}" class="btn-main btn-primary">Get Started</a>

    <a href="#" class="btn-main btn-secondary">View Security Docs</a>
</div>


</main>

<script>
    const ML_API = "http://127.0.0.1:8000/status";

    function updateHoneypotStatus() {
        fetch(ML_API)
        .then(res => res.json())
        .then(data => {
            if(data.status === "ATTACK") {
                document.getElementById("security-alert").style.display = "block";
                document.getElementById("main-body").classList.add("lockdown");

                setTimeout(() => {
                    window.location.href = "/fake_dashboard";
                }, 3000);
            }
        })
        .catch(() => console.log("Monitoring..."));
    }

    setInterval(updateHoneypotStatus, 3000);
</script>

</body>
</html>
