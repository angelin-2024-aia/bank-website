{% extends "base.html" %}
{% block title %}Contact | STB Bank{% endblock %}
{% block content %}
<main style="max-width:700px;margin:30px auto;padding:0 20px;">
    <h2 style="color:#00ff9d;margin-bottom:24px;">Contact Us</h2>

    {% if request.args.get("msg") %}
    <div style="padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;background:rgba(16,185,129,0.12);border:1px solid #10b981;color:#10b981;">
        {{ request.args.get("msg").split(":")[-1] }}
    </div>
    {% endif %}

    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;margin-bottom:20px;">
        <form method="POST" action="/contact-submit">
            <div style="display:flex;flex-direction:column;gap:14px;">
                <div>
                    <label style="display:block;font-size:11px;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">Your Name</label>
                    <input type="text" name="name" required placeholder="Angel Priya" style="width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:white;border-radius:8px;box-sizing:border-box;">
                </div>
                <div>
                    <label style="display:block;font-size:11px;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">Email Address</label>
                    <input type="email" name="email" required placeholder="you@email.com" style="width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:white;border-radius:8px;box-sizing:border-box;">
                </div>
                <div>
                    <label style="display:block;font-size:11px;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">Subject</label>
                    <input type="text" name="subject" placeholder="e.g. Card issue, loan query" style="width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:white;border-radius:8px;box-sizing:border-box;">
                </div>
                <div>
                    <label style="display:block;font-size:11px;color:#94a3b8;text-transform:uppercase;margin-bottom:6px;">Message</label>
                    <textarea name="message" rows="4" placeholder="How can we help?" style="width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:white;border-radius:8px;box-sizing:border-box;resize:vertical;"></textarea>
                </div>
                <button type="submit" class="btn">SEND MESSAGE</button>
            </div>
        </form>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;text-align:center;">
            <p style="color:#00ff9d;margin:0 0 6px;">📞 Phone</p>
            <p style="margin:0;font-size:14px;">1800-BANK-001</p>
        </div>
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;text-align:center;">
            <p style="color:#00ff9d;margin:0 0 6px;">✉️ Email</p>
            <p style="margin:0;font-size:14px;">support@stbbank.com</p>
        </div>
    </div>
</main>
{% endblock %}
