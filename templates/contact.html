<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Support | STB Bank</title>
</head>
<body>
    <header>
        <div class="logo"><h2>STB BANK</h2></div>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact" style="color: var(--neon-green);">Contact</a>
            <a href="/login">Login</a>
        </nav>
    </header>

    <main class="container">
        <div class="glass-card">
            <h1 style="font-family: 'Orbitron'; color: var(--neon-green);">CONTACT US</h1>
            <p style="color: #94a3b8;">Need help? Our AI-monitored support team is here 24/7.</p>

            <form style="margin-top: 30px;">
                <div style="display: flex; gap: 15px;">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                </div>
                <input type="text" placeholder="Subject" required>
                <textarea placeholder="How can we help you?" style="width:100%; height:120px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; border-radius:10px; padding:10px; margin:10px 0;"></textarea>
                <button type="submit" class="btn">SEND MESSAGE</button>
            </form>

            <div style="margin-top: 40px; display: flex; justify-content: space-around; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                <div style="text-align: center;">
                    <p style="color: var(--neon-green);">📞 PHONE</p>
                    <p>1800-BANK-001</p>
                </div>
                <div style="text-align: center;">
                    <p style="color: var(--neon-green);">✉️ EMAIL</p>
                    <p>support@stbbank.com</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
