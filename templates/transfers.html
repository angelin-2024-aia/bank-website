<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STB Bank - Transfer</title>
</head>
<body style="background: #020617; color: white; padding: 50px; font-family: sans-serif; text-align: center;">
    <div style="border: 1px solid #00ff9d; padding: 40px; border-radius: 15px; max-width: 400px; margin: auto;">
        <h1 style="color: #00ff9d;">💸 Send Money</h1>
        <form>
            <input type="text" placeholder="Account Number" style="width: 100%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white;">
            <input type="number" placeholder="Amount (₹)" style="width: 100%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white;">
            <button type="button" style="background: #00ff9d; color: black; border: none; padding: 15px 30px; width: 100%; font-weight: bold; cursor: pointer;">CONFIRM TRANSFER</button>
        </form>
        <br>
        <a href="{{ url_for('dashboard') }}" style="color: #94a3b8; text-decoration: none;">← Cancel & Go Back</a>
    </div>
</body>
</html>
