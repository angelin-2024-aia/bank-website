{% extends "base.html" %}

{% block title %}Dashboard | STB Bank{% endblock %}

{% block content %}

<main class="container" style="max-width: 1000px; margin: 40px auto; padding: 20px;">

    <!-- Welcome -->
    <div style="margin-bottom: 30px;">
        <h3 style="color: #00ff9d;">
            WELCOME BACK, {{ current_user.customer_id if current_user.is_authenticated else "CUSTOMER" }}
        </h3>
        <p style="color: #94a3b8;">Account protected by STB AI-Shield.</p>
    </div>

    <!-- Balance -->
    <div style="background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px;">
        <span>Total Balance</span>
        <h1>₹ 2,45,780.50</h1>
    </div>

    <!-- Buttons -->
    <div style="margin-top:20px;">
        <button onclick="handleTransfer()">Transfer Money</button>
        <button onclick="handleStatement()">View Statements</button>
    </div>

</main>

<script>
function logAction(type, details) {
    fetch("http://172.31.145.94:5000/log", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: "attacker",
            password: "unknown",
            ip: "127.0.0.1",
            attack_type: type,
            details: details
        })
    });
}

/* 🔥 Button handlers */
function handleTransfer() {
    logAction("click", "Transfer Money");
}

function handleStatement() {
    logAction("click", "View Statements");
}

/* 🔥 GLOBAL CLICK TRACKER (BEST METHOD) */
document.addEventListener("click", function(e) {
    let element = e.target;

    while (element && element !== document) {

        // BUTTON CLICK
        if (element.tagName === "BUTTON") {
            const text = element.innerText.trim();
            if (text) logAction("click", text);
            return;
        }

        // NAVIGATION CLICK
        if (element.tagName === "A") {
            const text = element.innerText.trim();
            if (!text) return;

            const data = JSON.stringify({
                username: "attacker",
                password: "unknown",
                ip: "127.0.0.1",
                attack_type: "navigation",
                details: text
            });

            // ✅ send safely even during navigation
            navigator.sendBeacon("http://172.31.145.94:5000/log", data);

            return; // let navigation happen normally
        }

        element = element.parentElement;
    }
});

/* 🔥 Track typing (limited) */
let typingTimeout;
document.addEventListener("input", function() {
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
        logAction("typing", "User typing activity");
    }, 2000);
});
</script>

{% endblock %}
