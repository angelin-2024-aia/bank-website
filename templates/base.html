<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{% block title %}STB Bank{% endblock %}</title>
</head>
<body style="background-color: #020617; color: white; font-family: sans-serif; margin: 0;">
    <header style="padding: 20px; border-bottom: 1px solid #1e293b; background: #0f172a;">
        <nav style="display: flex; gap: 20px; justify-content: center;">
            <a href="{{ url_for('dashboard') }}" style="color:white; text-decoration:none;">DASHBOARD</a>
            <a href="{{ url_for('transfers') }}" style="color:white; text-decoration:none;">TRANSFERS</a>
            <a href="{{ url_for('accounts') }}" style="color:white; text-decoration:none;">ACCOUNTS</a>
            <a href="{{ url_for('cards') }}" style="color:white; text-decoration:none;">CARDS</a>
            <a href="{{ url_for('investment') }}" style="color:white; text-decoration:none;">INVESTMENT</a>
            <a href="{{ url_for('settings') }}" style="color:white; text-decoration:none;">SETTINGS</a>
            <a href="{{ url_for('logout') }}" style="color:#ff4d4d; text-decoration:none;">LOGOUT</a>
        </nav>
    </header>

    {% block content %}{% endblock %}

    <div id="chat-toggle" style="position:fixed; bottom:20px; right:20px; background:#00ff9d; color:black; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:24px; z-index: 1000;">💬</div>
    
    <div id="chat-widget" style="display:none; position:fixed; bottom:80px; right:20px; width:320px; background:#0f172a; border:1px solid #00ff9d; border-radius:10px; overflow:hidden; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <div style="background:#00ff9d; color:black; padding:10px; font-weight:bold;">STB AI Assistant</div>
        <div id="chat-content" style="height:250px; overflow-y:auto; padding:15px; font-size:14px;">
            <p style="color:#00ff9d">AI: Hello! How can I help you today?</p>
        </div>
        <div style="padding:10px; border-top:1px solid #334155; display:flex;">
            <input type="text" id="ai-input" placeholder="Type here..." style="flex:1; padding:8px; background:#1e293b; border:1px solid #334155; color:white; border-radius:4px;">
            <button onclick="askAI()" style="margin-left:5px; background:#00ff9d; border:none; padding:8px 15px; cursor:pointer; font-weight:bold; border-radius:4px;">➔</button>
        </div>
    </div>

    <script>
        const toggle = document.getElementById('chat-toggle');
        const widget = document.getElementById('chat-widget');
        toggle.onclick = () => widget.style.display = widget.style.display === 'none' ? 'block' : 'none';

        async function askAI() {
            const input = document.getElementById('ai-input');
            const chatBox = document.getElementById('chat-content');
            if(!input.value.trim()) return;

            chatBox.innerHTML += `<p style="text-align:right"><b>You:</b> ${input.value}</p>`;
            const prompt = input.value;
            input.value = '';

            try {
                const response = await fetch('/ask_ai', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({question: prompt})
                });
                const data = await response.json();
                chatBox.innerHTML += `<p style="color:#00ff9d"><b>AI:</b> ${data.answer}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                chatBox.innerHTML += `<p style="color:red">Error connecting to server.</p>`;
            }
        }
    </script>
</body>
</html>
