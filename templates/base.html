<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{% block title %}STB Bank{% endblock %}</title>
</head>
<body style="background:#020617; color:white; font-family:sans-serif; margin:0;">
<header style="padding:15px 5%; border-bottom:1px solid #1e293b; background:#0f172a; display:flex; justify-content:space-between; align-items:center;">
    <div style="font-family:monospace; font-size:1.2rem; color:#00ff9d; font-weight:bold;">
        ₹ STB Bank
    </div>
    <nav style="display:flex; gap:20px;">
        <a href="{{ url_for('dashboard') }}"  style="color:white; text-decoration:none; font-size:13px;">DASHBOARD</a>
        <a href="{{ url_for('transfers') }}"  style="color:white; text-decoration:none; font-size:13px;">TRANSFERS</a>
        <a href="{{ url_for('accounts') }}"   style="color:white; text-decoration:none; font-size:13px;">ACCOUNTS</a>
        <a href="{{ url_for('cards') }}"      style="color:white; text-decoration:none; font-size:13px;">CARDS</a>
        <a href="{{ url_for('loans') }}"      style="color:white; text-decoration:none; font-size:13px;">LOANS</a>
        <a href="{{ url_for('investment') }}" style="color:white; text-decoration:none; font-size:13px;">INVESTMENT</a>
        <a href="{{ url_for('support') }}"    style="color:white; text-decoration:none; font-size:13px;">SUPPORT</a>
        <a href="{{ url_for('settings') }}"   style="color:white; text-decoration:none; font-size:13px;">SETTINGS</a>
        <a href="{{ url_for('logout') }}"     style="color:#ff4d4d; text-decoration:none; font-size:13px;">LOGOUT</a>
    </nav>
</header>

{% block content %}{% endblock %}

<div id="chat-toggle" style="position:fixed;bottom:20px;right:20px;background:#00ff9d;color:black;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;z-index:1000;">💬</div>
<div id="chat-widget" style="display:none;position:fixed;bottom:80px;right:20px;width:320px;background:#0f172a;border:1px solid #00ff9d;border-radius:10px;overflow:hidden;z-index:1000;box-shadow:0 10px 25px rgba(0,0,0,0.5);">
    <div style="background:#00ff9d;color:black;padding:10px;font-weight:bold;display:flex;justify-content:space-between;">
        <span>STB AI Assistant</span>
        <span onclick="document.getElementById('chat-widget').style.display='none'" style="cursor:pointer;">✕</span>
    </div>
    <div id="chat-content" style="height:250px;overflow-y:auto;padding:15px;font-size:13px;">
        <p style="color:#00ff9d;">AI: Hello! How can I help you today?</p>
    </div>
    <div style="padding:10px;border-top:1px solid #334155;display:flex;gap:5px;">
        <input type="text" id="ai-input" placeholder="Ask AI..." style="flex:1;padding:8px;background:#1e293b;border:1px solid #334155;color:white;border-radius:4px;outline:none;">
        <button onclick="askAI()" style="background:#00ff9d;border:none;padding:8px 14px;cursor:pointer;font-weight:bold;border-radius:4px;">➔</button>
    </div>
</div>
<script>
const toggle = document.getElementById('chat-toggle');
const widget = document.getElementById('chat-widget');
toggle.onclick = () => widget.style.display = widget.style.display === 'none' ? 'block' : 'none';
document.getElementById('ai-input').addEventListener('keydown', e => { if(e.key==='Enter') askAI(); });
async function askAI() {
    const input = document.getElementById('ai-input');
    const box   = document.getElementById('chat-content');
    const q = input.value.trim();
    if(!q) return;
    input.value = '';
    box.innerHTML += `<p style="text-align:right;color:white;"><b>You:</b> ${q}</p>`;
    box.innerHTML += `<p style="color:#00ff9d;" id="thinking">AI: Thinking...</p>`;
    box.scrollTop = box.scrollHeight;
    try {
        const res  = await fetch('/ask_ai', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question:q}) });
        const data = await res.json();
        document.getElementById('thinking').textContent = 'AI: ' + (data.answer || 'Sorry, I could not process that.');
    } catch(e) {
        document.getElementById('thinking').style.color = 'red';
        document.getElementById('thinking').textContent = 'AI: Server offline.';
    }
    box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
